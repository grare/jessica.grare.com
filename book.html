<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey the Giraffe | Square Storybook</title>
    <style>
        :root {
            --bg-color: white;      
            --accent-color: #64ffda;  
            --page-bg: #ffffff;
            --text-color: black;
            /* SQUARE MATH: 
               1:1 page + 1:1 page = 2:1 spread ratio 
            */
            --aspect-ratio: 2 / 1; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: var(--text-color);
            perspective: 3000px;
            overflow: hidden;
        }

        /* Container for the book */
        .book-container {
            width: 90vw;
            max-width: 1000px; /* Increased max-width for square spreads */
            aspect-ratio: var(--aspect-ratio);
            position: relative;
            margin-bottom: 40px;
        }

        /* Page Spreads */
        .spread {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0;
            pointer-events: none;
            transform: rotateY(15deg) scale(0.95);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .spread.active {
            opacity: 1;
            pointer-events: auto;
            transform: rotateY(0deg) scale(1);
            z-index: 5;
        }

        /* Individual Pages */
        .page {
            flex: 1;
            background: var(--page-bg);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Keeps square images crisp and filled */
            display: block;
        }

        /* Special States */
        .blank-page { background: transparent !important; box-shadow: none !important; }
        .cover-right { border-radius: 0 4px 4px 0; box-shadow: 20px 10px 40px rgba(0,0,0,0.5); }
        .back-left { border-radius: 4px 0 0 4px; box-shadow: -20px 10px 40px rgba(0,0,0,0.5); }

        /* The Spine Crease */
        .spine {
            position: absolute;
            left: 50%;
            width: 2px;
            height: 100%;
            background: rgba(0,0,0,0.15);
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        /* Navigation Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(100, 255, 218, 0.05);
        }

        .btn:disabled { opacity: 0.1; cursor: not-allowed; }

        .info {
            font-size: 0.65rem;
            color: rgba(0,0,0,0.4);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="book-container">
        
        <div class="spread active">
            <div class="page blank-page"></div>
            <div class="page cover-right">
                <img src="images/Sogroya/GiraffeStory_Layout_Cover.jpg" alt="Cover">
            </div>
            <div class="spine"></div>
        </div>

        <div class="spread">
            <div class="page"><img src="images/Sogroya/BookPage1.png" alt="Page 1"></div>
            <div class="page"><img src="images/Sogroya/BookPage2.png" alt="Page 2"></div>
            <div class="spine"></div>
        </div>
		
		<div class="spread">
            <div class="page"><img src="images/Sogroya/BookPage3.png" alt="Page 1"></div>
            <div class="page"><img src="images/Sogroya/BookPage4.png" alt="Page 2"></div>
            <div class="spine"></div>
        </div>
		
		<div class="spread">
            <div class="page"><img src="images/Sogroya/BookPage5.png" alt="Page 1"></div>
            <div class="page"><img src="images/Sogroya/BookPage6.png" alt="Page 2"></div>
            <div class="spine"></div>
        </div>

        <div class="spread">
            <div class="page back-left">
                <img src="images/Sogroya/BookPage7.png" alt="Back Cover">
            </div>
            <div class="page blank-page"></div>
            <div class="spine"></div>
        </div>

    </div>

    <div class="controls">
        <button class="btn" id="prevBtn" onclick="move(-1)" disabled>Prev</button>
        <span class="info" id="status">Front Cover</span>
        <button class="btn" id="nextBtn" onclick="move(1)">Next</button>
    </div>

    <script>
        let currentIdx = 0;
        const spreads = document.querySelectorAll('.spread');
        const statusText = document.getElementById('status');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function move(direction) {
            // Exit motion
            spreads[currentIdx].style.transform = direction === 1 
                ? "rotateY(-25deg) scale(0.85) translateX(-80px)" 
                : "rotateY(25deg) scale(0.85) translateX(80px)";
            spreads[currentIdx].classList.remove('active');

            currentIdx += direction;

            // Entry motion
            spreads[currentIdx].style.transform = "";
            spreads[currentIdx].classList.add('active');

            updateUI();
        }

        function updateUI() {
            prevBtn.disabled = (currentIdx === 0);
            nextBtn.disabled = (currentIdx === spreads.length - 1);

            if (currentIdx === 0) statusText.innerText = "Front Cover";
            else if (currentIdx === spreads.length - 1) statusText.innerText = "Back Cover";
            else statusText.innerText = `Spread ${currentIdx} of ${spreads.length - 2}`;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" && currentIdx < spreads.length - 1) move(1);
            if (e.key === "ArrowLeft" && currentIdx > 0) move(-1);
        });
    </script>
</body>
</html>
