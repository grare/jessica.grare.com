  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

nt-weight: 500;\n  font-display: swap;\n  src: url(\"9dc4c04b-74b6-4178-81b2-2e0375141fb0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"fd1b3a64-d2d5-48aa-8e0c-8c999c27cb07\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bce87e94-a407-450a-a5e6-211d1c96c986\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4cd2ecca-20c8-4265-986a-0b8b5dbbcdb6\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c84e99ec-6aa7-4db3-a3d8-33c0115e64cb\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4823a43f-e2bc-4474-8568-69d13b00a4f9\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9dc4c04b-74b6-4178-81b2-2e0375141fb0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --paper: #f3e9d7;\n    --paper-2: #ece0c8;\n    --paper-3: #e3d3b3;\n    --ink: #2a1d12;\n    --ink-2: #5a4632;\n    --ink-3: #8b7253;\n    --rule: #c9b691;\n    --terracotta: #c25a3b;\n    --turmeric: #d99a2b;\n    --sage: #6b7d5b;\n    --plum: #6b3a4f;\n    --stamp-red: #b03a2e;\n    --stamp-blue: #2c4a6b;\n  }\n  * { box-sizing: border-box; }\n  body {\n    margin: 0;\n    background-color: var(--paper);\n    background-image:\n      repeating-linear-gradient(90deg, rgba(139,114,83,0.04) 0 1px, transparent 1px 4px),\n      repeating-linear-gradient(0deg,  rgba(139,114,83,0.04) 0 1px, transparent 1px 4px);\n    color: var(--ink);\n    font-family: 'Inter', system-ui, sans-serif;\n    padding: 56px 28px 80px;\n  }\n  .wrap { max-width: 1180px; margin: 0 auto; }\n\n  /* Type */\n  .h1 { font-family: 'DM Serif Display', serif; font-size: 56px; line-height: 1; letter-spacing: -0.02em; margin: 0; }\n  .h2 { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1.05; margin: 0; }\n  .h3 { font-family: 'DM Serif Display', serif; font-size: 20px; line-height: 1.1; margin: 0; }\n  .script { font-family: 'Caveat', cursive; color: var(--terracotta); }\n  .mono { font-family: 'JetBrains Mono', monospace; }\n  .eyebrow {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; font-weight: 600;\n    letter-spacing: 0.2em; text-transform: uppercase;\n    color: var(--ink-3);\n  }\n\n  /* Header */\n  header {\n    display: flex; align-items: flex-end; justify-content: space-between;\n    gap: 40px; padding-bottom: 28px;\n    border-bottom: 1px dashed var(--rule);\n    margin-bottom: 44px;\n    flex-wrap: wrap;\n  }\n  header .meta {\n    text-align: right;\n    color: var(--ink-2);\n    font-size: 12px;\n    line-height: 1.6;\n    font-family: 'JetBrains Mono', monospace;\n  }\n  .lede {\n    margin-top: 18px;\n    font-size: 18px;\n    line-height: 1.5;\n    color: var(--ink-2);\n    max-width: 720px;\n  }\n  .lede em {\n    font-family: 'Caveat', cursive;\n    font-style: normal;\n    font-size: 22px;\n    color: var(--terracotta);\n  }\n\n  /* Section heads */\n  .section { margin-top: 56px; }\n  .section-head {\n    display: flex; align-items: baseline; gap: 18px;\n    border-bottom: 1px solid var(--rule);\n    padding-bottom: 10px; margin-bottom: 24px;\n  }\n  .section-num {\n    font-family: 'DM Serif Display', serif;\n    font-size: 36px; color: var(--terracotta);\n    line-height: 1;\n  }\n  .section-head h2 { flex: 1; }\n  .section-head .count {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; letter-spacing: 0.18em;\n    color: var(--ink-3);\n  }\n\n  /* Spec card */\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));\n    gap: 22px;\n  }\n  .card {\n    background: var(--paper-2);\n    border: 1px solid var(--rule);\n    border-radius: 10px;\n    padding: 18px;\n    position: relative;\n    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset, 0 4px 14px rgba(80,50,20,0.06);\n  }\n  .card-head {\n    display: flex; align-items: baseline; gap: 10px;\n    margin-bottom: 12px;\n    padding-bottom: 10px;\n    border-bottom: 1px dashed var(--rule);\n  }\n  .card-head h3 { flex: 1; font-size: 17px; }\n  .card-tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px; letter-spacing: 0.15em;\n    padding: 3px 8px;\n    border-radius: 100px;\n    text-transform: uppercase;\n  }\n  .tag-photo  { background: rgba(194,90,59,0.12);  color: var(--terracotta); border: 1px solid rgba(194,90,59,0.3); }\n  .tag-icon   { background: rgba(107,125,91,0.14); color: var(--sage); border: 1px solid rgba(107,125,91,0.3); }\n  .tag-stamp  { background: rgba(176,58,46,0.12);  color: var(--stamp-red); border: 1px solid rgba(176,58,46,0.3); }\n  .tag-badge  { background: rgba(217,154,43,0.18); color: #8a5e15; border: 1px solid rgba(217,154,43,0.4); }\n  .tag-flag   { background: rgba(44,74,107,0.12);  color: var(--stamp-blue); border: 1px solid rgba(44,74,107,0.3); }\n\n  .preview {\n    background: var(--paper);\n    border: 1px dashed var(--rule);\n    border-radius: 8px;\n    padding: 22px 14px;\n    margin-bottom: 14px;\n    display: flex; align-items: center; justify-content: center;\n    min-height: 140px;\n  }\n  .spec-row {\n    display: grid;\n    grid-template-columns: 88px 1fr;\n    gap: 8px 14px;\n    font-size: 13px;\n    line-height: 1.5;\n  }\n  .spec-row dt {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    padding-top: 3px;\n  }\n  .spec-row dd {\n    margin: 0;\n    color: var(--ink-2);\n  }\n  .px {\n    font-family: 'JetBrains Mono', monospace;\n    color: var(--ink);\n    font-weight: 600;\n  }\n  .where {\n    margin-top: 12px;\n    padding-top: 12px;\n    border-top: 1px dashed var(--rule);\n    font-size: 11.5px;\n    color: var(--ink-3);\n    line-height: 1.5;\n  }\n  .where strong { color: var(--ink-2); font-weight: 600; }\n\n  /* Visual previews */\n  .ph-rect {\n    background: var(--paper-3);\n    border-radius: 8px;\n    position: relative;\n    overflow: hidden;\n    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 12px rgba(80,50,20,0.08);\n  }\n  .ph-rect::before {\n    content: '';\n    position: absolute; inset: 0;\n    background-image: linear-gradient(135deg, rgba(139,114,83,0.06) 0 8px, transparent 8px 16px);\n  }\n  .ph-rect::after {\n    content: attr(data-w) ' × ' attr(data-h);\n    position: absolute; inset: 0;\n    display: flex; align-items: center; justify-content: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; letter-spacing: 0.12em;\n    color: var(--ink-3);\n  }\n  .ph-disc {\n    border-radius: 50%;\n    background: var(--plum);\n    color: #fff;\n    display: flex; align-items: center; justify-content: center;\n    font-family: 'DM Serif Display', serif;\n  }\n  .ph-stamp {\n    border-radius: 50%;\n    border: 2px solid currentColor;\n    color: var(--stamp-red);\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-weight: 700;\n    text-transform: uppercase;\n    letter-spacing: 0.08em;\n    background: rgba(176,58,46,0.04);\n    transform: rotate(-6deg);\n    position: relative;\n  }\n  .ph-stamp::after {\n    content: '';\n    position: absolute; inset: 6px;\n    border: 1.5px dashed currentColor;\n    border-radius: 50%;\n    opacity: 0.6;\n  }\n  .ph-icon {\n    color: var(--ink);\n    background: var(--paper-3);\n    border-radius: 10px;\n    display: flex; align-items: center; justify-content: center;\n  }\n  .ph-flag {\n    border-radius: 8px;\n    background: var(--paper-3);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--ink);\n    font-family: 'JetBrains Mono', monospace;\n    font-weight: 600;\n    font-size: 11px;\n    letter-spacing: 0.15em;\n    border: 1px solid var(--rule);\n  }\n  .ph-rounded-icon {\n    border-radius: 10px;\n    color: #fff;\n    display: flex; align-items: center; justify-content: center;\n  }\n\n  /* Summary table */\n  .summary {\n    width: 100%;\n    border-collapse: collapse;\n    background: var(--paper-2);\n    border: 1px solid var(--rule);\n    border-radius: 10px;\n    overflow: hidden;\n    font-size: 13px;\n  }\n  .summary th, .summary td {\n    text-align: left;\n    padding: 12px 16px;\n    border-bottom: 1px dashed var(--rule);\n  }\n  .summary th {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    background: var(--paper-3);\n    font-weight: 600;\n  }\n  .summary tr:last-child td { border-bottom: none; }\n  .summary td.px-cell {\n    font-family: 'JetBrains Mono', monospace;\n    font-weight: 600;\n    color: var(--ink);\n    white-space: nowrap;\n  }\n  .summary td.fmt-cell {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--ink-2);\n  }\n\n  /* File-format legend */\n  .legend {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n    gap: 18px;\n    margin-top: 18px;\n  }\n  .legend-card {\n    background: var(--paper-2);\n    border: 1px solid var(--rule);\n    border-radius: 10px;\n    padding: 18px;\n  }\n  .legend-card .ext {\n    font-family: 'DM Serif Display', serif;\n    font-size: 26px;\n    color: var(--terracotta);\n    margin-bottom: 6px;\n  }\n  .legend-card p {\n    margin: 6px 0 0;\n    font-size: 12.5px;\n    line-height: 1.55;\n    color: var(--ink-2);\n  }\n\n  /* Notes block */\n  .notes {\n    margin-top: 28px;\n    background: var(--paper-2);\n    border: 1px dashed var(--ink-3);\n    border-radius: 10px;\n    padding: 22px 26px;\n  }\n  .notes h3 {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--terracotta);\n    margin: 0 0 10px;\n  }\n  .notes ul {\n    margin: 0; padding-left: 18px;\n    font-size: 13px; line-height: 1.7;\n    color: var(--ink-2);\n  }\n  .notes ul li::marker { color: var(--terracotta); }\n\n  .pill {\n    display: inline-block;\n    padding: 2px 8px;\n    background: var(--paper-3);\n    border: 1px solid var(--rule);\n    border-radius: 100px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.08em;\n    color: var(--ink-2);\n  }\n  /* Style guide tab bar */\n  .guide-tabs {\n    position: sticky;\n    top: 0;\n    z-index: 50;\n    background: var(--paper);\n    border-bottom: 1px solid var(--rule);\n    padding: 12px 0;\n    margin-bottom: 24px;\n  }\n  .guide-tabs-inner {\n    max-width: 980px;\n    margin: 0 auto;\n    padding: 0 32px;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .guide-tabs .label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    margin-right: 14px;\n  }\n  .guide-tabs a {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--ink-2);\n    text-decoration: none;\n    padding: 8px 14px;\n    border-radius: 999px;\n    border: 1px solid transparent;\n    transition: all 120ms ease;\n  }\n  .guide-tabs a:hover {\n    color: var(--ink);\n    border-color: var(--rule);\n  }\n  .guide-tabs a.active {\n    color: var(--terracotta);\n    background: var(--paper-2);\n    border-color: var(--rule);\n  }\n  @media print {\n    .guide-tabs { display: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<nav class=\"guide-tabs\">\n  <div class=\"guide-tabs-inner\">\n    <span class=\"label\">TravelBite · Style Guides<\u002Fspan>\n    <a href=\"Asset Spec.html\" class=\"active\">Asset Spec<\u002Fa>\n    <a href=\"Dark Mode Palette.html\">Dark Mode Palette<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n<div class=\"wrap\">\n\n  <header>\n    <div>\n      <div class=\"eyebrow\">TravelBite · Production Asset Brief<\u002Fdiv>\n      <h1 class=\"h1\" style=\"margin-top:10px\">Image &amp; icon spec sheet<\u002Fh1>\n      <p class=\"lede\">\n        Every visual slot in the app — dish photography, spice discs, passport stamps, achievement badges,\n        nav icons, country flags, source-app marks — with <em>exact pixel dimensions<\u002Fem>,\n        recommended file formats and where each one appears.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"meta\">\n      v1 · 2026-04<br>\n      base device · 360 × 760<br>\n      design DPR · 3× (Android xxhdpi)<br>\n      color · sRGB\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ───────────────── 1. Typography ───────────────── -->\n  <section class=\"section\">\n    <div class=\"section-head\">\n      <div class=\"section-num\">01<\u002Fdiv>\n      <h2 class=\"h2\">Type hierarchy<\u002Fh2>\n      <div class=\"count\">4 families · 12 roles<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"max-width:760px;color:var(--ink-2);font-size:14px;line-height:1.6;margin:0 0 28px 0;\">\n      Four typefaces carry the entire app, each doing one job. <strong>DM Serif Display<\u002Fstrong> is the\n      headline voice — warm, slightly bookish, used for dish names, screen titles and oversized numerals.\n      <strong>Inter<\u002Fstrong> handles all running UI text and body copy. <strong>JetBrains Mono<\u002Fstrong>\n      is the “stamped” voice for eyebrows, metadata, technical labels and anything that wants the\n      authority of a passport entry. <strong>Caveat<\u002Fstrong> is the script note — sparingly used to\n      give a recipe or postcard the hand-written feel of a travel journal.\n    <\u002Fp>\n\n    <!-- Family overview -->\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(240px,1fr));margin-bottom:32px;\">\n\n      <div class=\"card\">\n        <div class=\"card-head\"><h3 style=\"font-family:'DM Serif Display',serif;\">DM Serif<\u002Fh3><span class=\"card-tag tag-photo\">Display<\u002Fspan><\u002Fdiv>\n        <div class=\"preview\" style=\"font-family:'DM Serif Display',serif;font-size:54px;line-height:1;color:var(--ink);min-height:120px;\">Aa<\u002Fdiv>\n        <dl class=\"spec-row\">\n          <dt>Family<\u002Fdt><dd><span class=\"px\">DM Serif Display<\u002Fspan><\u002Fdd>\n          <dt>Weights<\u002Fdt><dd>400 (regular only)<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Headlines, dish names, recipe titles, large numerals<\u002Fdd>\n          <dt>Source<\u002Fdt><dd>Google Fonts — free for commercial<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-head\"><h3 style=\"font-family:'Inter',sans-serif;\">Inter<\u002Fh3><span class=\"card-tag tag-icon\">Body<\u002Fspan><\u002Fdiv>\n        <div class=\"preview\" style=\"font-family:'Inter',sans-serif;font-size:54px;line-height:1;color:var(--ink);min-height:120px;font-weight:500;\">Aa<\u002Fdiv>\n        <dl class=\"spec-row\">\n          <dt>Family<\u002Fdt><dd><span class=\"px\">Inter<\u002Fspan><\u002Fdd>\n          <dt>Weights<\u002Fdt><dd>400 reg · 500 med · 600 sbd · 700 bld<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>UI body, buttons, descriptions, all running prose<\u002Fdd>\n          <dt>Source<\u002Fdt><dd>Google Fonts — free for commercial<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-head\"><h3 style=\"font-family:'JetBrains Mono',monospace;\">JB Mono<\u002Fh3><span class=\"card-tag tag-flag\">Stamped<\u002Fspan><\u002Fdiv>\n        <div class=\"preview\" style=\"font-family:'JetBrains Mono',monospace;font-size:48px;line-height:1;color:var(--ink);min-height:120px;font-weight:600;\">Aa<\u002Fdiv>\n        <dl class=\"spec-row\">\n          <dt>Family<\u002Fdt><dd><span class=\"px\">JetBrains Mono<\u002Fspan><\u002Fdd>\n          <dt>Weights<\u002Fdt><dd>400 reg · 500 med · 700 bld<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Eyebrows, metadata labels, stamps, mono numerals<\u002Fdd>\n          <dt>Source<\u002Fdt><dd>Google Fonts — free for commercial<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-head\"><h3 style=\"font-family:'Caveat',cursive;font-weight:600;\">Caveat<\u002Fh3><span class=\"card-tag tag-stamp\">Script<\u002Fspan><\u002Fdiv>\n        <div class=\"preview\" style=\"font-family:'Caveat',cursive;font-size:64px;line-height:1;color:var(--terracotta);min-height:120px;font-weight:600;\">Aa<\u002Fdiv>\n        <dl class=\"spec-row\">\n          <dt>Family<\u002Fdt><dd><span class=\"px\">Caveat<\u002Fspan><\u002Fdd>\n          <dt>Weights<\u002Fdt><dd>500 · 600 · 700<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Travel-journal scribbles, postcards, terracotta script notes<\u002Fdd>\n          <dt>Source<\u002Fdt><dd>Google Fonts — free for commercial<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Type scale -->\n    <h3 class=\"h3\" style=\"margin-bottom:14px;\">Type scale &amp; semantic roles<\u002Fh3>\n    <p style=\"max-width:760px;color:var(--ink-2);font-size:13px;line-height:1.6;margin:0 0 18px 0;\">\n      Every text style in the prototype is one of these. Match the role to the surface; don’t mix sizes outside the scale.\n    <\u002Fp>\n\n    <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:32px;\">\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:40px;line-height:0.95;letter-spacing:-0.02em;color:var(--ink);\">Display headline<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.h1<\u002Fspan><\u002Fdd>\n          <dt>Family<\u002Fdt><dd>DM Serif Display 400<\u002Fdd>\n          <dt>Size / lh<\u002Fdt><dd><span class=\"px\">40 / 38<\u002Fspan><\u002Fdd>\n          <dt>Tracking<\u002Fdt><dd>−2%<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Hero greeting on Home, recipe-title overlay on detail hero<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:28px;line-height:1;letter-spacing:-0.01em;color:var(--ink);\">Section title<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.h2<\u002Fspan><\u002Fdd>\n          <dt>Family<\u002Fdt><dd>DM Serif Display 400<\u002Fdd>\n          <dt>Size / lh<\u002Fdt><dd><span class=\"px\">28 / 28<\u002Fspan><\u002Fdd>\n          <dt>Tracking<\u002Fdt><dd>−1%<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Recipe / spice / cuisine names, big card titles<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:20px;line-height:1.1;color:var(--ink);\">Card heading<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.h3<\u002Fspan><\u002Fdd>\n          <dt>Family<\u002Fdt><dd>DM Serif Display 400<\u002Fdd>\n          <dt>Size / lh<\u002Fdt><dd><span class=\"px\">20 / 22<\u002Fspan><\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Recipe row titles, list cards, sub-cards<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink);\">Inline serif<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.serif<\u002Fspan> (size set inline)<\u002Fdd>\n          <dt>Family<\u002Fdt><dd>DM Serif Display 400<\u002Fdd>\n          <dt>Size range<\u002Fdt><dd><span class=\"px\">13–56 px<\u002Fspan> per context<\u002Fdd>\n          <dt>Tracking<\u002Fdt><dd>−1%<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Numerals (30m, 94%, 4), spice names in grids, postcards<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;color:var(--ink-2);\">Body text — the running prose of the app, set in Inter regular at fourteen.<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd>(default body)<\u002Fdd>\n          <dt>Family<\u002Fdt><dd>Inter 400<\u002Fdd>\n          <dt>Size / lh<\u002Fdt><dd><span class=\"px\">14 / 21<\u002Fspan><\u002Fdd>\n          <dt>Color<\u002Fdt><dd><span class=\"px\">var(--ink-2)<\u002Fspan><\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Recipe step body, descriptions, postcards, all longform<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:13px;line-height:1.4;color:var(--ink-2);font-weight:500;\">Body small — captions and dense rows<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Family<\u002Fdt><dd>Inter 400 / 500<\u002Fdd>\n          <dt>Size / lh<\u002Fdt><dd><span class=\"px\">11–13 / 1.4<\u002Fspan><\u002Fdd>\n          <dt>Color<\u002Fdt><dd><span class=\"px\">var(--ink-2)<\u002Fspan> / <span class=\"px\">var(--ink-3)<\u002Fspan><\u002Fdd>\n          <dt>Use<\u002Fdt><dd>List sub-text, tag pills, secondary captions<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-0.005em;\">Button label — Primary<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.btn-primary<\u002Fspan> / <span class=\"px\">.btn-ghost<\u002Fspan><\u002Fdd>\n          <dt>Family<\u002Fdt><dd>Inter 600<\u002Fdd>\n          <dt>Size / lh<\u002Fdt><dd><span class=\"px\">14 / 1<\u002Fspan><\u002Fdd>\n          <dt>Use<\u002Fdt><dd>All CTAs, sheet actions, segmented control items<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);\">EYEBROW · CATEGORY<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.eyebrow<\u002Fspan><\u002Fdd>\n          <dt>Family<\u002Fdt><dd>JetBrains Mono 600<\u002Fdd>\n          <dt>Size / lh<\u002Fdt><dd><span class=\"px\">10 / 1.4<\u002Fspan><\u002Fdd>\n          <dt>Tracking<\u002Fdt><dd>+18%<\u002Fdd>\n          <dt>Color<\u002Fdt><dd><span class=\"px\">var(--ink-3)<\u002Fspan><\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Section labels, “TODAY’S CARD”, “MOST STAMPED”<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);\">META · 9PX<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.mono<\u002Fspan> (size inline)<\u002Fdd>\n          <dt>Family<\u002Fdt><dd>JetBrains Mono 400 / 500<\u002Fdd>\n          <dt>Size / lh<\u002Fdt><dd><span class=\"px\">8–11 / 1.3<\u002Fspan><\u002Fdd>\n          <dt>Tracking<\u002Fdt><dd>+12% to +18%<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Stat labels, regions (TUNIS), pin counts, “47-DAY STREAK”<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'Caveat',cursive;font-size:22px;color:var(--terracotta);font-weight:600;\">A whisper of warmth<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.script-note<\u002Fspan> / <span class=\"px\">.script<\u002Fspan><\u002Fdd>\n          <dt>Family<\u002Fdt><dd>Caveat 600<\u002Fdd>\n          <dt>Size range<\u002Fdt><dd><span class=\"px\">17–22 / 1.0–1.4<\u002Fspan><\u002Fdd>\n          <dt>Color<\u002Fdt><dd><span class=\"px\">var(--terracotta)<\u002Fspan> or <span class=\"px\">var(--ink-2)<\u002Fspan><\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Postcards, Today’s Card descriptions, cooking-tip callouts<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--stamp-red);text-align:center;border:2px solid var(--stamp-red);border-radius:50%;width:84px;height:84px;display:flex;align-items:center;justify-content:center;transform:rotate(-6deg);\">TUNIS<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.stamp<\u002Fspan> (interior)<\u002Fdd>\n          <dt>Family<\u002Fdt><dd>JetBrains Mono 700<\u002Fdd>\n          <dt>Size<\u002Fdt><dd><span class=\"px\">9–11<\u002Fspan> depending on stamp size<\u002Fdd>\n          <dt>Tracking<\u002Fdt><dd>+8%<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>City names inside passport stamps<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\">\n        <div style=\"flex:0 0 auto;width:300px;\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:56px;color:#f3e9d7;background:#6b3a4f;width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 -4px 8px rgba(0,0,0,0.2);\">八<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\" style=\"flex:1;min-width:240px;\">\n          <dt>Class<\u002Fdt><dd><span class=\"px\">.spice-disc<\u002Fspan><\u002Fdd>\n          <dt>Family<\u002Fdt><dd>DM Serif Display 400<\u002Fdd>\n          <dt>Size range<\u002Fdt><dd><span class=\"px\">14–56<\u002Fspan> scaled with disc<\u002Fdd>\n          <dt>Color<\u002Fdt><dd><span class=\"px\">#f3e9d7<\u002Fspan> on tinted disc<\u002Fdd>\n          <dt>Use<\u002Fdt><dd>Single character or short script glyph (八, 香, サフラン)<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- Loader / google fonts -->\n    <div class=\"grid\" style=\"grid-template-columns:1fr 1fr;\">\n      <div class=\"card\">\n        <div class=\"card-head\"><h3>Loading the families<\u002Fh3><span class=\"card-tag tag-icon\">CSS<\u002Fspan><\u002Fdiv>\n        <pre style=\"background:var(--paper);border:1px dashed var(--rule);border-radius:6px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;color:var(--ink-2);overflow-x:auto;margin:0;white-space:pre-wrap;\">&lt;link href=\"https://fonts.googleapis.com/css2?\nfamily=DM+Serif+Display&amp;\nfamily=Caveat:wght@500;600;700&amp;\nfamily=Inter:wght@400;500;600;700&amp;\nfamily=JetBrains+Mono:wght@400;500;700&amp;\ndisplay=swap\" rel=\"stylesheet\" /&gt;<\u002Fpre>\n        <dl class=\"spec-row\" style=\"margin-top:14px;\">\n          <dt>Total weight<\u002Fdt><dd>~165 KB combined (woff2, all 4 families, 12 weights)<\u002Fdd>\n          <dt>Display<\u002Fdt><dd><span class=\"px\">swap<\u002Fspan> — fall back to <span class=\"px\">Georgia<\u002Fspan> / <span class=\"px\">system-ui<\u002Fspan> / <span class=\"px\">Courier New<\u002Fspan> / <span class=\"px\">Comic Sans MS<\u002Fspan><\u002Fdd>\n          <dt>Self-host?<\u002Fdt><dd>Recommended for production — download woff2 from gwfh.mranftl.com, serve from CDN<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-head\"><h3>Pairing rules<\u002Fh3><span class=\"card-tag tag-stamp\">Style<\u002Fspan><\u002Fdiv>\n        <ul style=\"margin:0;padding-left:18px;font-size:13px;line-height:1.65;color:var(--ink-2);\">\n          <li><strong>Never<\u002Fstrong> set DM Serif under 13 px — the slabs collapse. Use Inter for small.<\u002Fli>\n          <li><strong>Always<\u002Fstrong> pair an eyebrow (mono) with a serif headline below. The contrast is the look.<\u002Fli>\n          <li><strong>One<\u002Fstrong> Caveat callout per screen, max. Script is precious; over-use = greeting card.<\u002Fli>\n          <li><strong>Numerals<\u002Fstrong> in stat tiles are DM Serif (not Inter) — the editorial feel.<\u002Fli>\n          <li><strong>Buttons<\u002Fstrong> are Inter 600, never serif. Save the serif for nouns, not verbs.<\u002Fli>\n          <li><strong>Mono tracking<\u002Fstrong> is always positive (+8% to +18%). It widens the rhythm so the labels feel stamped.<\u002Fli>\n          <li><strong>Color<\u002Fstrong>: serif = ink, body = ink-2, mono labels = ink-3, script = terracotta. Don’t cross-mix.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ───────────────── 2. Color hierarchy ───────────────── -->\n  <section class=\"section\">\n    <div class=\"section-head\">\n      <div class=\"section-num\">02<\u002Fdiv>\n      <h2 class=\"h2\">Color hierarchy<\u002Fh2>\n      <div class=\"count\">3 tiers · light + dark<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"max-width:760px;color:var(--ink-2);font-size:14px;line-height:1.6;margin:0 0 28px 0;\">\n      Every color in the app belongs to one of three tiers: <strong>backgrounds<\u002Fstrong> (the surfaces things sit on),\n      <strong>borders &amp; strokes<\u002Fstrong> (the rules and dividers between things), and <strong>text<\u002Fstrong>\n      (the ink itself, in three weights of emphasis). Accents — terracotta, turmeric, sage, plum — are summoned\n      sparingly on top of these tiers and are documented in §03–§07.\n    <\u002Fp>\n\n    <!-- ── 2.1 Backgrounds ── -->\n    <h3 class=\"h3\" style=\"margin-bottom:6px;\">2.1 &nbsp; Backgrounds &nbsp;<span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;color:var(--ink-3);font-weight:400;\">· 4 SURFACES<\u002Fspan><\u002Fh3>\n    <p style=\"max-width:760px;color:var(--ink-2);font-size:13px;line-height:1.6;margin:0 0 16px 0;\">\n      Surfaces step from <em>page<\u002Fem> (the bottom-most paper) up to <em>elevated<\u002Fem> (cards, modals, sheets).\n      Higher tiers are slightly darker in light mode, slightly lighter in dark mode — the page should always\n      feel like the deepest layer.\n    <\u002Fp>\n\n    <table class=\"summary\" style=\"margin-bottom:36px;\">\n      <thead>\n        <tr>\n          <th style=\"width:60px;\">&nbsp;<\u002Fth>\n          <th>Token<\u002Fth>\n          <th>Light<\u002Fth>\n          <th>Dark<\u002Fth>\n          <th>Role<\u002Fth>\n          <th>Where<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#f3e9d7;border:1px solid var(--rule);\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--paper<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#f3e9d7<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#1a120c<\u002Fspan><\u002Ftd>\n          <td>Page surface — the canvas the whole app sits on.<\u002Ftd>\n          <td>Body background, scroll regions, fullscreen sheets.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#ece0c8;border:1px solid var(--rule);\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--paper-2<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#ece0c8<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#241910<\u002Fspan><\u002Ftd>\n          <td>Inset surface — sits inside cards as a subtle well.<\u002Ftd>\n          <td>Search wells, progress troughs, inactive chip backs.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#e3d3b3;border:1px solid var(--rule);\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--paper-3<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#e3d3b3<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#2f2317<\u002Fspan><\u002Ftd>\n          <td>Raised surface — cards, sheets, popovers, the cuisine wheel.<\u002Ftd>\n          <td>All <code>.card<\u002Fcode> blocks, modals, bottom sheets.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#251c14;border:1px solid var(--rule);\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--ink<\u002Fspan> <span style=\"font-size:10px;color:var(--ink-3);\">(inverted)<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#2a1d12<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#f3e9d7<\u002Fspan><\u002Ftd>\n          <td>Inverted surface — high-contrast “stamp” backgrounds.<\u002Ftd>\n          <td>Primary buttons, the dark hero band on Today’s Card.<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <!-- Live preview row -->\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:48px;\">\n      <div class=\"card\" style=\"padding:0;overflow:hidden;\">\n        <div style=\"background:#f3e9d7;padding:24px;height:120px;display:flex;align-items:flex-end;\">\n          <div style=\"background:#e3d3b3;border:1px dashed #c9b691;padding:10px 14px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#5a4632;\">card · paper-3<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px;border-top:1px dashed var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);letter-spacing:0.12em;\">LIGHT · paper → paper-3<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:0;overflow:hidden;\">\n        <div style=\"background:#1a120c;padding:24px;height:120px;display:flex;align-items:flex-end;\">\n          <div style=\"background:#2f2317;border:1px dashed #3d2e1f;padding:10px 14px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#bda782;\">card · paper-3<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px;border-top:1px dashed var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);letter-spacing:0.12em;\">DARK · paper → paper-3<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"padding:0;overflow:hidden;\">\n        <div style=\"background:#2a1d12;padding:24px;height:120px;display:flex;align-items:flex-end;\">\n          <div style=\"color:#f3e9d7;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;\">Inverted button surface<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px;border-top:1px dashed var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);letter-spacing:0.12em;\">--ink (inverted)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ── 2.2 Borders & strokes ── -->\n    <h3 class=\"h3\" style=\"margin-bottom:6px;\">2.2 &nbsp; Borders &amp; strokes &nbsp;<span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;color:var(--ink-3);font-weight:400;\">· 4 RULES<\u002Fspan><\u002Fh3>\n    <p style=\"max-width:760px;color:var(--ink-2);font-size:13px;line-height:1.6;margin:0 0 16px 0;\">\n      Three weights of rule, plus a focus ring. Solid <em>rule<\u002Fem> for hard edges, <em>dashed rule<\u002Fem>\n      for the “field-notes” feel between list rows, <em>hairline<\u002Fem> for inside cards. Never combine more\n      than two on a single screen.\n    <\u002Fp>\n\n    <table class=\"summary\" style=\"margin-bottom:36px;\">\n      <thead>\n        <tr>\n          <th style=\"width:80px;\">&nbsp;<\u002Fth>\n          <th>Token<\u002Fth>\n          <th>Light<\u002Fth>\n          <th>Dark<\u002Fth>\n          <th>Weight<\u002Fth>\n          <th>Where<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><div style=\"width:60px;height:30px;border:1px solid #c9b691;border-radius:4px;background:var(--paper);\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--rule<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#c9b691<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#3d2e1f<\u002Fspan><\u002Ftd>\n          <td>1px solid<\u002Ftd>\n          <td>Card outlines, table heads, button borders, section divider.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:60px;height:30px;border:1px dashed #c9b691;border-radius:4px;background:var(--paper);\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--rule<\u002Fspan> <em>(dashed)<\u002Fem><\u002Ftd>\n          <td><span class=\"px\">#c9b691<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#3d2e1f<\u002Fspan><\u002Ftd>\n          <td>1px dashed<\u002Ftd>\n          <td>List-row separators, “stitched” postcard edges, section heads.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:60px;height:30px;border:1px solid rgba(139,114,83,0.3);border-radius:4px;background:var(--paper);\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--hairline<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">rgba(139,114,83,0.3)<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">rgba(243,233,215,0.12)<\u002Fspan><\u002Ftd>\n          <td>1px solid<\u002Ftd>\n          <td>Inside-card dividers, ingredient checkbox outlines, chips.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:60px;height:30px;border:2px solid #c25a3b;border-radius:4px;background:var(--paper);box-shadow:0 0 0 2px rgba(194,90,59,0.18);\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--focus<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#c25a3b<\u002Fspan> + halo<\u002Ftd>\n          <td><span class=\"px\">#e07a5f<\u002Fspan> + halo<\u002Ftd>\n          <td>2px + 2px halo<\u002Ftd>\n          <td>Active input, focused button, selected pin on the atlas.<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <!-- Live preview row for borders -->\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:48px;\">\n      <div class=\"card\" style=\"background:var(--paper);\">\n        <div style=\"border:1px solid var(--rule);border-radius:6px;padding:18px;font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-2);\">Solid rule · cards<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"background:var(--paper);\">\n        <div style=\"border-bottom:1px dashed var(--rule);padding:10px 4px;font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-2);\">Eggs<\u002Fdiv>\n        <div style=\"border-bottom:1px dashed var(--rule);padding:10px 4px;font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-2);\">Olive oil<\u002Fdiv>\n        <div style=\"padding:10px 4px;font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-2);\">Yellow onion<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"background:var(--paper);\">\n        <div style=\"border:1px solid rgba(139,114,83,0.3);border-radius:4px;padding:14px;font-family:'Inter',sans-serif;font-size:12px;color:var(--ink-2);\">Hairline · inside cards<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"background:var(--paper);\">\n        <input type=\"text\" value=\"cumin\" style=\"width:100%;padding:10px 12px;border:2px solid var(--terracotta);border-radius:6px;outline:none;box-shadow:0 0 0 3px rgba(194,90,59,0.18);font-family:'Inter',sans-serif;font-size:13px;background:var(--paper);color:var(--ink);\" readonly=\"\">\n        <div style=\"margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-3);letter-spacing:0.12em;\">FOCUS RING<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ── 2.3 Text ── -->\n    <h3 class=\"h3\" style=\"margin-bottom:6px;\">2.3 &nbsp; Text &nbsp;<span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;color:var(--ink-3);font-weight:400;\">· 3 EMPHASIS LEVELS + ACCENTS<\u002Fspan><\u002Fh3>\n    <p style=\"max-width:760px;color:var(--ink-2);font-size:13px;line-height:1.6;margin:0 0 16px 0;\">\n      Three weights of ink, descending in importance. <em>Ink<\u002Fem> is for headlines and the things you\n      need to read first; <em>ink-2<\u002Fem> for body and supporting copy; <em>ink-3<\u002Fem> for labels, eyebrows,\n      meta. Accent text is reserved for the script voice and a small set of UI states.\n    <\u002Fp>\n\n    <table class=\"summary\" style=\"margin-bottom:24px;\">\n      <thead>\n        <tr>\n          <th style=\"width:60px;\">&nbsp;<\u002Fth>\n          <th>Token<\u002Fth>\n          <th>Light<\u002Fth>\n          <th>Dark<\u002Fth>\n          <th>Role<\u002Fth>\n          <th>Where<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#2a1d12;\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--ink<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#2a1d12<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#f3e9d7<\u002Fspan><\u002Ftd>\n          <td>Primary — headlines, dish names, primary numbers.<\u002Ftd>\n          <td>H1/H2/H3, recipe titles, big stats (94%, 4 serves).<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#5a4632;\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--ink-2<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#5a4632<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#bda782<\u002Fspan><\u002Ftd>\n          <td>Secondary — body copy, supporting prose, descriptions.<\u002Ftd>\n          <td>Recipe steps, postcard text, list sub-text, body paragraphs.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#8b7253;\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--ink-3<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#8b7253<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#8a7558<\u002Fspan><\u002Ftd>\n          <td>Tertiary — labels, eyebrows, meta, timestamps.<\u002Ftd>\n          <td>Mono eyebrows, captions, “need 3”, status pills.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#c25a3b;\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--terracotta<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#c25a3b<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#e07a5f<\u002Fspan><\u002Ftd>\n          <td>Accent — script voice, primary action, link text.<\u002Ftd>\n          <td>Caveat callouts, primary buttons, “Cook this →”, journey line.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><div style=\"width:40px;height:40px;border-radius:6px;background:#b03a2e;\"><\u002Fdiv><\u002Ftd>\n          <td><span class=\"px\">--stamp-red<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#b03a2e<\u002Fspan><\u002Ftd>\n          <td><span class=\"px\">#d6543e<\u002Fspan><\u002Ftd>\n          <td>Stamp ink — only inside passport stamps.<\u002Ftd>\n          <td>Stamp circles, “VISITED” / “NEW” badges.<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <!-- Live text preview -->\n    <div class=\"card\" style=\"background:var(--paper);margin-bottom:24px;\">\n      <div style=\"font-family:'DM Serif Display',serif;font-size:32px;line-height:1.05;color:var(--ink);\">Shakshuka <span class=\"script\" style=\"font-size:24px;\">— a Tunisian morning<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:10px;font-family:'Inter',sans-serif;font-size:14px;line-height:1.55;color:var(--ink-2);max-width:560px;\">\n        A bubbling pan of eggs poached in spiced tomato. Body copy sits at <code style=\"background:var(--paper-2);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:12px;\">--ink-2<\u002Fcode>\n        for comfortable reading at fourteen pixels.\n      <\u002Fdiv>\n      <div style=\"margin-top:12px;display:flex;gap:14px;align-items:center;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--ink-3);text-transform:uppercase;\">FROM TUNISIA · NORTH AFRICA<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-3);\">·<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-3);\">94% MATCH<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ── 2.4 Rules ── -->\n    <div class=\"grid\" style=\"grid-template-columns:1fr 1fr;gap:20px;\">\n      <div class=\"notes\">\n        <h4>Do<\u002Fh4>\n        <ul>\n          <li><strong>Stack tiers<\u002Fstrong>: page (paper) → inset (paper-2) → raised (paper-3). Don't skip.<\u002Fli>\n          <li><strong>Pair text + surface<\u002Fstrong>: ink on paper, ink-2 on paper-3 — never ink-3 on paper-3 (too low contrast).<\u002Fli>\n          <li><strong>Use dashed rule<\u002Fstrong> between list rows; solid rule for card outlines.<\u002Fli>\n          <li><strong>Test in dark<\u002Fstrong>: every token has a dark twin. If it doesn't, it isn't a token.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"notes\">\n        <h4>Don't<\u002Fh4>\n        <ul>\n          <li><strong>No new neutrals.<\u002Fstrong> If you want a new gray, you almost certainly want ink-2 or ink-3.<\u002Fli>\n          <li><strong>No accent text on accent surface.<\u002Fstrong> Terracotta text on a terracotta button = invisible.<\u002Fli>\n          <li><strong>No 1px gray hairlines<\u002Fstrong> below 0.2 alpha — they vanish on dark mode.<\u002Fli>\n          <li><strong>No raw hex in components.<\u002Fstrong> Always reference a token; the dark theme depends on it.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────── 3. Dish photography ───────────────── -->\n  <section class=\"section\">\n    <div class=\"section-head\">\n      <div class=\"section-num\">03<\u002Fdiv>\n      <h2 class=\"h2\">Dish photography<\u002Fh2>\n      <div class=\"count\">5 slot sizes<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid\">\n\n      <!-- Recipe hero -->\n      <div class=\"card\">\n        <div class=\"card-head\">\n          <h3>Recipe hero<\u002Fh3>\n          <span class=\"card-tag tag-photo\">Photo<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"preview\">\n          <div class=\"ph-rect\" data-w=\"360\" data-h=\"240\" style=\"width:280px;height:188px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\">\n          <dt>Display<\u002Fdt><dd><span c height:88px;font-size:30px;background:var(--terracotta)\">★<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\">\n          <dt>Display<\u002Fdt><dd><span class=\"px\">72 × 72<\u002Fspan> · today’s card<br><span class=\"px\">80 × 80<\u002Fspan> · import success<\u002Fdd>\n          <dt>Export<\u002Fdt><dd>SVG · <span class=\"px\">240 × 240<\u002Fspan> PNG @3×<\u002Fdd>\n        <\u002Fdl>\n        <div class=\"where\"><strong>Used on:<\u002Fstrong> Learn (today’s spice card); Import flow success state<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-head\">\n          <h3>M — Recipe ingredient row, profile avatar<\u002Fh3>\n          <span class=\"card-tag tag-icon\">Vector<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"preview\" style=\"gap:14px\">\n          <div class=\"ph-disc\" style=\"width:64px;height:64px;font-size:22px;background:#9e6b3a\">ك<\u002Fdiv>\n          <div class=\"ph-disc\" style=\"width:64px;height:64px;font-size:22px;background:#d99a2b\">ज<\u002Fdiv>\n          <div class=\"ph-disc\" style=\"width:64px;height:64px;font-size:22px;background:#c25a3b\">P<\u002Fdiv>\n        <\u002Fdiv>\n        <dl class=\"spec-row\">\n          <dt>Display<\u002Fdt><dd><span class=\"px\">64 × 64<\u002Fspan> (default)<\u002Fdd>\n          <dt>Export<\u002Fdt><dd>SVG · <span class=\"px\">192 × 192<\u002Fspan> PNG @3×<\u002Fdd>\n        <\u002Fdl>\n        <div class=\"where\"><strong>Used on:<\u002Fstrong> Recipe Detail (4-spice row); Passport avatar<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-head\">\n          <h3>S — Drawer grid, beyond-pantry, recipe spice list<\u002Fh3>\n          <span class=\"card-tag tag-icon\">Vector<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"preview\" style=\"gap:10px\">\n          <div class=\"ph-disc\" style=\"width:48px;height:48px;font-size:14px;background:#9e6b3a\">ك<\u002Fdiv>\n          <div class=\"ph-disc\" style=\"wi lor built-in (each source has its brand color)<\u002Fdd>\n          <dt>Trademark<\u002Fdt><dd>Use official monochrome marks — no recolor of TikTok / IG / Pinterest / YouTube logos beyond their brand-permitted variants<\u002Fdd>\n        <\u002Fdl>\n        <div class=\"where\"><strong>Used on:<\u002Fstrong> Import flow (6-tile picker on first step)<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────── 10. UI iconography ───────────────── -->\n  <section class=\"section\">\n    <div class=\"section-head\">\n      <div class=\"section-num\">11<\u002Fdiv>\n      <h2 class=\"h2\">UI iconography<\u002Fh2>\n      <div class=\"count\">all inline SVG · stroke 1.6px<\u002Fdiv>\n    <\u002Fdiv>\n\n    <table class=\"summary\">\n      <thead>\n        <tr>\n          <th>Icon<\u002Fth>\n          <th>Size<\u002Fth>\n          <th>Stroke<\u002Fth>\n          <th>Color<\u002Fth>\n          <th>Where<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>Tab-bar nav (home, pantry, recipes, learn, passport)<\u002Ftd><td class=\"px-cell\">22 × 22<\u002Ftd><td>1.6px<\u002Ftd><td>currentColor<\u002Ftd><td>Bottom tab bar (5 tabs)<\u002Ftd><\u002Ftr>\n        <tr><td>Header chevrons / arrows / close<\u002Ftd><td class=\"px-cell\">20 × 20<\u002Ftd><td>1.8px<\u002Ftd><td>var(--ink)<\u002Ftd><td>Top of every screen<\u002Ftd><\u002Ftr>\n        <tr><td>Action icons (search, barcode, receipt, filter, sort)<\u002Ftd><td class=\"px-cell\">18 × 18<\u002Ftd><td>1.6px<\u002Ftd><td>var(--ink) / var(--ink-3)<\u002Ftd><td>Pantry, Matches, Learn, Passport headers<\u002Ftd><\u002Ftr>\n        <tr><td>Inline meta (clock, flame, knife, leaf, sparkle)<\u002Ftd><td class=\"px-cell\">14 × 14<\u002Ftd><td>1.4px<\u002Ftd><td>var(--terracotta) / var(--ink-3)<\u002Ftd><td>Recipe cards, filter sheet groups<\u002Ftd><\u002Ftr>\n        <tr><td>Tiny dots / stars / chevrons<\u002Ftd><td class=\"px-cell\">10 × 10<\u002Ftd><td>1.2px<\u002Ftd><td>token-driven<\u002Ftd><td>Pip indicators, status dots<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fsection>\n\n  <!-- ───────────────── 9. Splash, app icon, social ───────────────── -->\n  <section class=\"section\">\n    <div class=\"section-head\">\n      <div class=\"section-num\">12<\u002Fdiv>\n      <h2 class=\"h2\">App icon, splash &amp; OG share<\u002Fh2>\n      <div class=\"count\">platform deliverables<\u002Fdiv>\n    <\u002Fdiv>\n\n    <table class=\"summary\">\n      <thead>\n        <tr>\n          <th>Asset<\u002Fth>\n          <th>Dimensions<\u002Fth>\n          <th>Format<\u002Fth>\n          <th>Notes<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td>Android adaptive icon — foreground<\u002Ftd>\n          <td class=\"px-cell\">432 × 432<\u002Ftd>\n          <td class=\"fmt-cell\">PNG-32 / SVG<\u002Ftd>\n          <td>Safe zone 264 × 264 centered<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Android adaptive icon — background<\u002Ftd>\n          <td class=\"px-cell\">432 × 432<\u002Ftd>\n          <td class=\"fmt-cell\">PNG-32 / solid color<\u002Ftd>\n          <td>var(--paper) field<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Play Store icon<\u002Ftd>\n          <td class=\"px-cell\">512 × 512<\u002Ftd>\n          <td class=\"fmt-cell\">PNG-32<\u002Ftd>\n          <td>32-bit alpha, no transparency at edges<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Splash screen logo<\u002Ftd>\n          <td class=\"px-cell\">288 × 288<\u002Ftd>\n          <td class=\"fmt-cell\">SVG / vector drawable<\u002Ftd>\n          <td>Centered on var(--paper); Android 12+ splash API<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Feature graphic (Play Store)<\u002Ftd>\n          <td class=\"px-cell\">1024 × 500<\u002Ftd>\n          <td class=\"fmt-cell\">JPG / PNG<\u002Ftd>\n          <td>Hero illustration, no text near edges<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Phone screenshots (Play Store)<\u002Ftd>\n          <td class=\"px-cell\">1080 × 1920<\u002Ftd>\n          <td class=\"fmt-cell\">JPG / PNG<\u002Ftd>\n          <td>Portrait, 16:9 — 3–8 images<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Social share / OG card<\u002Ftd>\n          <td class=\"px-cell\">1200 × 630<\u002Ftd>\n          <td class=\"fmt-cell\">PNG / JPG<\u002Ftd>\n          <td>For deep-link previews when sharing recipes<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fsection>\n\n  <!-- ───────────────── File format legend ───────────────── -->\n  <section class=\"section\">\n    <div class=\"section-head\">\n      <div class=\"section-num\">13<\u002Fdiv>\n      <h2 class=\"h2\">When to use which format<\u002Fh2>\n      <div class=\"count\">quick reference<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"legend\">\n      <div class=\"legend-card\">\n        <div class=\"ext\">.svg<\u002Fdiv>\n        <span class=\"pill\">vector · scalable<\u002Fspan>\n        <p>Spice discs, stamps, badges, all UI icons, source-app marks. Anything geometric.<br><strong>Pros:<\u002Fstrong> tiny, retina-perfect, recolorable via <code>currentColor<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"legend-card\">\n        <div class=\"ext\">.png-32<\u002Fdiv>\n        <span class=\"pill\">raster · alpha<\u002Fspan>\n        <p>When SVG isn't possible (textured stamps, distressed badges with raster effects). <strong>Always 3× device pixels;<\u002Fstrong> sRGB, no ICC profile.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"legend-card\">\n        <div class=\"ext\">.jpg<\u002Fdiv>\n        <span class=\"pill\">raster · photographic<\u002Fspan>\n        <p>All dish photography. <strong>q80–85,<\u002Fstrong> progressive, sRGB. No alpha needed — these always sit on solid card backgrounds.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"legend-card\">\n        <div class=\"ext\">.webp<\u002Fdiv>\n        <span class=\"pill\">raster · modern<\u002Fspan>\n        <p>Optional smaller-payload twin of every JPG. Serve via <code>&lt;picture&gt;<\u002Fcode> with JPG fallback. ~30% smaller at same quality.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────────── Production notes ───────────────── -->\n  <div class=\"notes\">\n    <h3>★ Production notes<\u002Fh3>\n    <ul>\n      <li><strong>Density:<\u002Fstrong> all raster assets exported at <span class=\"pill\">3×<\u002Fspan> for Android xxhdpi. Generate <span class=\"pill\">1×<\u002Fspan> and <span class=\"pill\">2×<\u002Fspan> variants for older devices, or rely on a single 3× and let Android downscale.<\u002Fli>\n      <li><strong>Color profile:<\u002Fstrong> sRGB only. Strip ICC profiles to keep file size down; don't ship Display-P3 or Adobe RGB — they render dimmer on Android.<\u002Fli>\n      <li><strong>Transparency:<\u002Fstrong> stamps and badges <em>must<\u002Fem> be transparent PNG-32 — they overlay rotated on photos. JPG would baked-in the white background.<\u002Fli>\n      <li><strong>Naming convention:<\u002Fstrong> <code>dish-shakshuka@3x.jpg<\u002Fcode>, <code>spice-cumin-disc.svg<\u002Fcode>, <code>stamp-tunis.png<\u002Fcode>, <code>badge-rank-3.svg<\u002Fcode>, <code>source-tiktok.svg<\u002Fcode>.<\u002Fli>\n      <li><strong>Trademarked marks:<\u002Fstrong> use only the official brand assets for TikTok, Instagram, Pinterest, YouTube. Do not recolor.<\u002Fli>\n      <li><strong>Dark-mode:<\u002Fstrong> all photos render against dark paper too — make sure subjects are well-lit so they don't disappear. Add a 1px <code>rgba(255,255,255,0.06)<\u002Fcode> inner stroke on `.food-ph` if needed.<\u002Fli>\n      <li><strong>Spice discs<\u002Fstrong> have a built-in printed-paper noise overlay applied via CSS — supply <em>flat<\u002Fem> color circles, no texture.<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<script>\n  // Inject the same continent paths used in the prototype into both previews.\n  const MAP_SVG = `\n    <g class=\"grat\">\n      <line x1=\"0\" y1=\"15\" x2=\"100\" y2=\"15\" stroke-width=\"0.12\" stroke-dasharray=\"0.5,0.8\" opacity=\"0.35\"/>\n      <line x1=\"0\" y1=\"30\" x2=\"100\" y2=\"30\" stroke-width=\"0.12\" stroke-dasharray=\"0.5,0.8\" opacity=\"0.35\"/>\n      <line x1=\"0\" y1=\"45\" x2=\"100\" y2=\"45\" stroke-width=\"0.12\" stroke-dasharray=\"0.5,0.8\" opacity=\"0.35\"/>\n      <line x1=\"20\" y1=\"0\" x2=\"20\" y2=\"60\" stroke-width=\"0.12\" stroke-dasharray=\"0.5,0.8\" opacity=\"0.25\"/>\n      <line x1=\"40\" y1=\"0\" x2=\"40\" y2=\"60\" stroke-width=\"0.12\" stroke-dasharray=\"0.5,0.8\" opacity=\"0.25\"/>\n      <line x1=\"60\" y1=\"0\" x2=\"60\" y2=\"60\" stroke-width=\"0.12\" stroke-dasharray=\"0.5,0.8\" opacity=\"0.25\"/>\n      <line x1=\"80\" y1=\"0\" x2=\"80\" y2=\"60\" stroke-width=\"0.12\" stroke-dasharray=\"0.5,0.8\" opacity=\"0.25\"/>\n    <\u002Fg>\n    <g class=\"land\" stroke-width=\"0.18\" stroke-linejoin=\"round\">\n      <path d=\"M5 12 L8 11 L12 10 L16 10 L19 12 L22 13 L26 12 L30 11 L33 12 L34 14 L33 17 L34 20 L32 22 L29 23 L28 26 L26 28 L24 30 L21 33 L19 36 L17 38 L15 39 L13 38 L12 35 L11 31 L10 27 L9 23 L8 19 L7 16 L6 14 Z\" />\n      <path d=\"M36 8 L40 7 L43 9 L42 12 L40 14 L37 14 L35 12 L35 10 Z\" />\n      <path d=\"M22 33 L24 34 L26 35 L25 37 L23 36 Z\" />\n      <path d=\"M28 36 L31 36 L33 37 L34 40 L34 44 L32 48 L30 52 L28 55 L26 56 L25 53 L25 49 L26 45 L27 41 L28 38 Z\" />\n      <path d=\"M46 14 L50 13 L54 13 L56 14 L57 16 L55 17 L53 18 L51 17 L49 18 L47 17 L46 16 Z\" />\n      <path d=\"M51 9 L54 8 L56 10 L55 12 L52 12 Z\" />\n      <path d=\"M44 14 L46 14 L46 16 L44 17 Z\" />\n      <path d=\"M48 22 L52 20 L56 21 L58 23 L59 26 L58 30 L56 34 L54 38 L52 41 L50 42 L48 41 L47 38 L46 34 L46 30 L47 26 Z\" />\n      <path d=\"M61 36 L62 36 L62 39 L61 40 Z\" />\n      <path d=\"M58 22 L62 22 L63 24 L62 27 L60 28 L58 26 Z\" />\n      <path d=\"M58 12 L64 10 L70 10 L76 11 L82 12 L86 14 L88 17 L86 20 L83 21 L80 22 L77 22 L74 23 L70 22 L66 21 L62 20 L60 18 L58 15 Z\" />\n      <path d=\"M68 22 L71 22 L71 26 L70 29 L68 30 L67 27 Z\" />\n      <path d=\"M76 22 L79 23 L80 26 L79 29 L77 30 L75 28 L75 25 Z\" />\n      <path d=\"M76 33 L80 32 L83 33 L82 35 L78 35 Z M85 34 L88 34 L87 36 L85 36 Z\" />\n      <path d=\"M86 18 L88 17 L89 20 L87 22 Z\" />\n      <path d=\"M82 25 L84 25 L84 28 L82 28 Z\" />\n      <path d=\"M80 42 L86 42 L90 44 L91 47 L89 49 L84 50 L80 49 L78 46 Z\" />\n      <path d=\"M93 50 L95 50 L95 53 L93 53 Z\" />\n    <\u002Fg>\n    <path class=\"journey\" d=\"M20 32 Q35 24 50 26 Q53 18 70 26 Q76 24 82 18\" stroke-width=\"0.4\" stroke-dasharray=\"1,1.2\" fill=\"none\" opacity=\"0.7\"/>\n  `;\n\n  function paint(id, theme) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    el.innerHTML = MAP_SVG;\n    const grat = el.querySelectorAll('.grat line');\n    const land = el.querySelector('.land');\n    const journey = el.querySelector('.journey');\n    if (theme === 'dark') {\n      grat.forEach(l => l.setAttribute('stroke', '#d0b591'));\n      land.setAttribute('fill', '#2f2419');\n      land.setAttribute('stroke', '#d0b591');\n      journey.setAttribute('stroke', '#e07a5a');\n    } else {\n      grat.forEach(l => l.setAttribute('stroke', '#8b7253'));\n      land.setAttribute('fill', '#e3d3b3');\n      land.setAttribute('stroke', '#8b7253');\n      journey.setAttribute('stroke', '#c25a3b');\n    }\n  }\n  paint('map-light', 'light');\n  paint('map-dark', 'dark');\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
