<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TravelBite · single-screen export</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@500;600;700&display=swap');
  html, body { margin: 0; padding: 0; background: #1a1208; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    padding: 30px 0;
    box-sizing: border-box;
  }
  #root { display: flex; align-items: center; justify-content: center; }
  /* Hide the PhoneApp's wrapper chrome — render only the phone bezel itself */
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script src="tb-assets.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="phone.jsx"></script>
<script type="text/babel" src="screens-a.jsx"></script>
<script type="text/babel" src="screens-b.jsx"></script>
<script type="text/babel" src="phone-app.jsx"></script>

<script type="text/babel" data-presets="env,react">
const params = new URLSearchParams(location.search);
const initial = params.get('screen') || 'home';
const dark = params.get('dark') !== '0';

function ExportRoot() {
  const setDark = () => {};
  return (
    <div style={{
      width: 360, height: 760,
      borderRadius: 36, padding: 6,
      background: dark ? '#241712' : '#3b2a1c',
      boxShadow: '0 30px 60px rgba(40,20,8,0.35), inset 0 0 0 1px rgba(255,255,255,0.05)',
    }}>
      <PhoneApp initialScreen={initial} dark={dark} setDark={setDark} embedded={false} showSpec={false} />
    </div>
  );
}

const waitFor = () => {
  if (typeof PhoneApp === 'undefined') { setTimeout(waitFor, 50); return; }
  ReactDOM.createRoot(document.getElementById('root')).render(<ExportRoot />);
};
waitFor();
</script>
</body>
</html>
